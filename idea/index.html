---
title: 想法
layout: default
---
<!DOCTYPE html>
<html>
<!-- Page Header -->
<header class="intro-header" style="background-image: url('{{ site.baseurl }}/img/post-bg-kuaidi.jpg')">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">
                <div class="site-heading" id="tag-heading">
                    <h2>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</h2>
                </div>
            </div>
        </div>
    </div>
    <style>
        .idea_class li {
          width: 48%;
          display: inline-block;
          padding: 1%;
        }
        @media(min-width: 1200px){
          .idea_class li {
          width: 32%;
          display: inline-block;
          padding: 1%;
        }
        }
        @media(max-width: 800px){
          .idea_class li {
          width: 98%;
          display: inline-block;
          padding: 1%;
        }
        }
        .idea_class img {
        width: 100%;
        }
        .idea_item{
          width:100%;
          height:100%;
          border:2px solid #696969;
          border-radius: 10px
        }
        .idea_item li{
          width:100%;
          height:100%;
          display:list-item;
        }
    </style>
</header>

<body>
<main>
<ul class='idea_class'>
  {% for img in site.posts %}
  {% if img.idea %}
  <li class="idea_item">
    <a href='{{ site.baseurl }}{{ img.url }}'>
      <h1>{{ img.title }}</h1>
      <hr/>
      <time>{{ img.date | date: '%d %B %Y'}}</time>
      <div>{{ img.content }}</div>
    </a>
  </li>
  {% endif %}
  {% endfor %}
</ul>

</main>

</body>
</html>
